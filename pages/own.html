<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="stylesheet" href="/resources/css/style.css"/>
    <link rel="icon" href="/resources/icon.png" type="image/png">
    <link rel="shortcut icon" href="/resources/icon.png" type="image/png">
    <meta name="apple-touch-icon" content="/resources/icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等比数列多项计算</title>
    <style>
        /* 保持原有CSS风格，针对结果显示区域进行分组优化 */
        #resultArea {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            text-align: left;
        }

        .res-group {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.2);
        }

        .res-group:last-child {
            border-bottom: none;
        }

        .res-title {
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
            color: #333;
        }

        .res-item {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 1.05em;
            line-height: 1.6;
        }

        .tag {
            color: #555;
        }

        .val {
            color: #007AFF;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="ambient"></div>
<script src="/resources/js/bvambient.js"></script>

<div class="card">

    <h1>等比数列多项计算</h1>

    <label for="a0Input">中心项数值 (a₀)：</label>
    <input type="text" id="a0Input">

    <label for="rateInput">增长百分比 (%)：</label>
    <input type="text" id="rateInput" value="0.75">

    <label for="countInput">项数 (n)：</label>
    <input type="text" id="countInput" value="4">

    <button onclick="calculate()">执行计算</button>

    <div id="resultArea">
        等待输入数据并计算...
    </div>

    <button onclick="location.href='/index.html'">回到主页</button>

</div>

<script>
    function calculate() {
        var a0 = parseFloat(document.getElementById("a0Input").value);
        var ratePercent = parseFloat(document.getElementById("rateInput").value);
        var n = parseInt(document.getElementById("countInput").value);
        var resultArea = document.getElementById("resultArea");

        if (isNaN(a0) || isNaN(ratePercent) || isNaN(n)) {
            resultArea.innerHTML = "<span style='color:red;'>输入无效，请输入a₀数值</span>";
            return;
        }

        var r = 1 + ratePercent / 100;

        // 计算函数 a_x = a0 * r^x
        function getV(x) {
            return (a0 * Math.pow(r, x)).toFixed(4);
        }

        var html = "";

        // 第一组：顺序改为 an, a(n-1), a-1
        html += "<div class='res-group'>";
        html += "<div class='res-title'>[ 🔻 ]</div>";
        html += "<div class='res-item'><span class='tag'>a<sub>" + n + "</sub> (🛑):</span><span class='val'>" + getV(n) + "</span></div>";
        html += "<div class='res-item'><span class='tag'>a<sub>" + (n - 1) + "</sub> (🔚):</span><span class='val'>" + getV(n - 1) + "</span></div>";
        html += "<div class='res-item'><span class='tag'>a<sub>-1</sub> (🔛):</span><span class='val'>" + getV(-1) + "</span></div>";
        html += "</div>";

// 第二组：顺序改为 a1, a-(n-1), a-n
        html += "<div class='res-group'>";
        html += "<div class='res-title'>[ 🔺 ]</div>";
        html += "<div class='res-item'><span class='tag'>a<sub>1</sub> (🔚):</span><span class='val'>" + getV(1) + "</span></div>";
        html += "<div class='res-item'><span class='tag'>a<sub>-" + (n - 1) + "</sub> (🔛):</span><span class='val'>" + getV(-(n - 1)) + "</span></div>";
        html += "<div class='res-item'><span class='tag'>a<sub>-" + n + "</sub> (🛑):</span><span class='val'>" + getV(-n) + "</span></div>";
        html += "</div>";

        resultArea.innerHTML = html;
    }
</script>

</body>
</html>
