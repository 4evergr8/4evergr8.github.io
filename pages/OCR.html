<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="stylesheet" href="/resources/css/style.css"/>
    <link rel="icon" href="/resources/icon.png" type="image/png">
    <meta name="apple-touch-icon" content="/resources/icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览器 OCR 识别</title>
</head>
<body>

<div id="ambient"></div>
<script src="/resources/js/bvambient.js"></script>

<div class="card">
    <h1>OCR 文字识别</h1>

    <label>上传图片</label>
    <input type="file" id="fileInput" accept="image/*" onchange="runOCR()">


    <button onclick="pasteImage()">剪贴板图片</button>
    <button onclick="runOCR()">开始识别</button>

    <pre id="result" style="margin-top:20px; white-space: pre-wrap;"></pre>
    <button id="copyBtn" onclick="copyResult()" style="display:none;">复制结果</button>


    <h3>首次加载模型较慢，请耐心等待</h3>

    <button onclick="location.href='/index.html'">回到主页</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let pastedImage = null;
    let ocrText = "";

    async function pasteImage() {
        try {
            const items = await navigator.clipboard.read();
            for (const item of items) {
                for (const type of item.types) {
                    if (type.startsWith("image/")) {
                        const blob = await item.getType(type);
                        pastedImage = blob;
                        runOCR();
                        return;
                    }
                }
            }
            alert("剪贴板中没有图片");
        } catch (e) {
            alert("读取剪贴板失败，请使用 HTTPS 页面");
        }
    }

    async function runOCR() {
        const file = document.getElementById("fileInput").files[0];
        const img = file || pastedImage;
        if (!img) return;

        document.getElementById("result").textContent = "识别中...";
        document.getElementById("copyBtn").style.display = "none";

        const { data: { text } } = await Tesseract.recognize(
            img,
            "jpn+chi_sim+eng"
        );

        ocrText = text.replace(/[\s\u3000]+/g, "");
        document.getElementById("result").textContent = ocrText;

        if (ocrText) {
            document.getElementById("copyBtn").style.display = "inline-block";
        }
    }

    async function copyResult() {
        if (!ocrText) return;
        await navigator.clipboard.writeText(ocrText);
    }
</script>

</body>
</html>
