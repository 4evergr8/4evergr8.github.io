<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录页面</title>
</head>
<body>

<h2>登录</h2>

<form onsubmit="handleLogin(event)">
    <label>账号：</label><br>
    <input type="text" id="username"><br><br>

    <label>密码：</label><br>
    <input type="password" id="password"><br><br>

    <button type="submit">登录</button>
</form>

<script>
function handleLogin(event) {
    event.preventDefault();
    location.reload();
}
</script>

</body>
</html>
